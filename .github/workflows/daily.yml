name: AI Daily Digest

# 毎日 JST 09:00（UTC 00:00）に実行。手動実行も可能。
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# リポジトリへレポートをコミットするための書き込み権限
permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          # config.py の PROVIDER に応じて使われる方が読み込まれる。
          # 使う方の Secret だけ登録すればよい。
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ collectors/seen.json
          # 変更がある場合のみコミット
          git diff --staged --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push
